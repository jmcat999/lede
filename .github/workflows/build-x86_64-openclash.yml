name: Build LEDE x86_64 With OpenClash

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '.config'
      - '.github/workflows/build-x86_64-openclash.yml'

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          docker system prune -af || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt update -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext \
            genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
            libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
            libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev ninja-build p7zip p7zip-full patch pkgconf \
            python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
            swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add OpenClash package
        run: |
          git clone --depth=1 https://github.com/vernesong/OpenClash.git /tmp/OpenClash
          rm -rf package/lean/luci-app-openclash package/luci-app-openclash package/openclash
          cp -a /tmp/OpenClash/luci-app-openclash package/luci-app-openclash
          test -f package/luci-app-openclash/Makefile

      - name: Generate final config
        run: |
          make defconfig
          grep -E 'CONFIG_TARGET_x86|CONFIG_PACKAGE_luci-app-openclash|CONFIG_PACKAGE_luci-theme-argon|CONFIG_PACKAGE_luci-app-argon-config|CONFIG_PACKAGE_dnsmasq-full|CONFIG_PACKAGE_kmod-tun' .config || true
          grep -q '^CONFIG_PACKAGE_luci-app-openclash=y' .config
          grep -q '^CONFIG_PACKAGE_luci-theme-argon=y' .config || true

      - name: Download package sources
        run: |
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Build firmware
        run: |
          make V=s -j$(nproc)

      - name: Organize firmware
        if: always()
        run: |
          mkdir -p firmware
          cp -a bin/targets/x86/64/* firmware/ 2>/dev/null || true
          find firmware -type f | sort || true

      - name: Upload firmware
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: lede-x86_64-openclash-firmware
          path: firmware

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lede-x86_64-openclash-build-logs
          path: |
            logs
            .config
